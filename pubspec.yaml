name: work_mitra
description: Work Mitra — India ka #1 Local Jobs App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase Core ──────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.14

  # ── Google Sign-In ─────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Push Notifications ─────────────────────────────────────
  flutter_local_notifications: ^17.0.0

  # ── Location ───────────────────────────────────────────────
  geolocator: ^11.0.0

  # ── State Management ───────────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage ──────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── URL Launcher ───────────────────────────────────────────
  url_launcher: ^6.2.6

  # ── Permissions ────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Utils ──────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.3.3

  # ── UI ─────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
